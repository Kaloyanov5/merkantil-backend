spring:
  application:
    name: merkantil
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:merkantil_db}?createDatabaseIfNotExist=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      timeout: 3000ms

  # Session Configuration
  session:
    store-type: redis
    timeout: 86400s
    redis:
      namespace: merkantil:session

  # Google OAuth2
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: email, profile

  # Mail Configuration
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# Server Configuration
server:
  port: ${SERVER_PORT:8080}
  servlet:
    session:
      cookie:
        name: MERKANTIL_SESSION
        http-only: true
        max-age: 86400 # 24 hours
        # secure + same-site come from profile-specific config

# Logging (profile-specific levels merge over this baseline)
logging:
  level:
    org.springframework.web.socket.config.WebSocketMessageBrokerStats: WARN

stock:
  api:
    provider: massive

massive:
  api:
    key: ${MASSIVE_API_KEY}
    base-url: https://api.massive.com
    timeout: 10000  # 10 seconds
  ws:
    # WebSocket live-price stream. When healthy, the REST polling tick in
    # StockPriceScheduler skips its work; flip enabled=false to fall back to
    # pure REST polling without touching code.
    enabled: ${MASSIVE_WS_ENABLED:true}
    url: ${MASSIVE_WS_URL:wss://delayed.massive.com/stocks}
    # If no A event arrives within this window the WS is treated as unhealthy
    # and the REST scheduler resumes as fallback (handles off-hours / dead air).
    stale-threshold-seconds: 60
    reconnect:
      initial-backoff-ms: 1000
      max-backoff-ms: 60000

remember:
  me:
    key: ${REMEMBER_ME_KEY}

app:
  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  # Trusted proxy IPs whose X-Forwarded-For header is honored when extracting
  # the client IP for rate limits, 2FA temp-token binding, and the login
  # session audit trail. Empty default = don't trust any proxy (correct for
  # localhost / direct-exposure dev). In prod, set this to the LB / proxy IPs.
  trusted-proxies: ${TRUSTED_PROXIES:}